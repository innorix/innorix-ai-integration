###############################################################################

# Transfer Configuration

#

# This file defines the transfer workflow between enterprise

# systems and AI platforms.

###############################################################################

###############################################################################

# Job

###############################################################################

job:

name: AI Dataset Ingestion

description: Transfer enterprise datasets to AI shared storage.

###############################################################################

# Transfer Mode

###############################################################################

mode: ingestion

# Available modes:

# - ingestion

# - distribution

###############################################################################

# Source

###############################################################################

source:

# Source location

path: /data/source

###############################################################################

# Destination

###############################################################################

destination:

# Destination location

path: /data/ai-storage

###############################################################################

# File Selection

###############################################################################

selection:

include:

```
- "*.jpg"
- "*.png"
- "*.json"
```

exclude:

```
- "*.tmp"
- "*.bak"
```

###############################################################################

# Transfer Options

###############################################################################

transfer:

overwrite: true

verify: true

preserve_timestamp: true

create_destination: true

recursive: true

###############################################################################

# Performance

###############################################################################

performance:

parallel_transfers: 4

retry_count: 3

retry_interval: 10

###############################################################################

# Completion

###############################################################################

completion:

delete_source_after_transfer: false

generate_report: true

###############################################################################

# Logging

###############################################################################

logging:

level: INFO
